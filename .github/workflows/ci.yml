name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff pytest

      - name: Lint
        run: ruff check --select E9,F63,F7,F82 backend server.py scripts

      - name: Compile
        run: python -m compileall -q backend server.py scripts

      - name: Contract check, if usable
        run: |
          if [ -f scripts/check_dashboard_contract.py ]; then
            python scripts/check_dashboard_contract.py || echo "Contract check skipped or incomplete: no public fixture/private data in CI."
          else
            echo "No contract check script yet."
          fi

      - name: Tests, if present
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests directory."
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check JavaScript
        run: |
          if [ -d frontend/js ]; then
            echo '{"type":"module"}' > frontend/js/package.json
            find frontend/js -name '*.js' -print0 | xargs -0 -n1 node --check
            rm -f frontend/js/package.json
          else
            echo "No frontend/js directory."
          fi

      - name: npm test, if present
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm ci
            npm test --if-present
          else
            echo "No frontend/package.json."
          fi
